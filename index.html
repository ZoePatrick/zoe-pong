<!DOCTYPE html>
<html lang='de'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Zoe Pong</title>
<style>
body{margin:0;background:#081018;color:#fff;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
h1{color:#7cf7ff;text-shadow:0 0 12px #7cf7ff;margin:8px 0} canvas{background:#000;border:3px solid #7cf7ff;box-shadow:0 0 25px rgba(124,247,255,.35)} #hud{margin:8px 0} button{padding:10px 18px;border:none;border-radius:8px;background:#7cf7ff;color:#00131a;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<h1>🏓 Zoe Pong</h1>
<div id='hud'>Links: W/S | Rechts: ↑/↓</div>
<canvas id='game' width='800' height='500'></canvas>
<button onclick='startGame()'>Start</button>
<script>
const c=document.getElementById('game'),x=c.getContext('2d');
let left={x:20,y:200,w:12,h:90,dy:0,score:0}, right={x:768,y:200,w:12,h:90,dy:0,score:0};
let ball={x:400,y:250,r:9,dx:5,dy:3}, keys={}, running=false, ac=null;
function beep(f,d,v=0.04){ if(!ac) ac=new (window.AudioContext||window.webkitAudioContext)(); const o=ac.createOscillator(), g=ac.createGain(); o.frequency.value=f; g.gain.value=v; o.connect(g); g.connect(ac.destination); o.start(); setTimeout(()=>o.stop(),d); }
function resetBall(dir=1){ ball={x:400,y:250,r:9,dx:5*dir,dy:(Math.random()*4)-2}; }
function draw(){ x.clearRect(0,0,800,500); x.fillStyle='#fff'; for(let i=0;i<500;i+=24) x.fillRect(398,i,4,14); x.fillRect(left.x,left.y,left.w,left.h); x.fillRect(right.x,right.y,right.w,right.h); x.beginPath(); x.arc(ball.x,ball.y,ball.r,0,Math.PI*2); x.fill(); x.font='32px Arial'; x.fillText(left.score,300,50); x.fillText(right.score,480,50); }
function update(){ left.y+=left.dy; right.y+=right.dy; left.y=Math.max(0,Math.min(410,left.y)); right.y=Math.max(0,Math.min(410,right.y)); ball.x+=ball.dx; ball.y+=ball.dy; if(ball.y<ball.r||ball.y>500-ball.r){ ball.dy*=-1; beep(240,60);} if(ball.x-ball.r<left.x+left.w&&ball.y>left.y&&ball.y<left.y+left.h){ ball.dx=Math.abs(ball.dx)+0.2; beep(520,50);} if(ball.x+ball.r>right.x&&ball.y>right.y&&ball.y<right.y+right.h){ ball.dx=-Math.abs(ball.dx)-0.2; beep(520,50);} if(ball.x<0){ right.score++; beep(120,200); resetBall(1);} if(ball.x>800){ left.score++; beep(120,200); resetBall(-1);} }
function loop(){ if(!running) return; update(); draw(); requestAnimationFrame(loop); }
function startGame(){ running=true; left.score=0; right.score=0; resetBall(Math.random()>0.5?1:-1); requestAnimationFrame(loop); }
document.addEventListener('keydown',e=>{ if(e.key==='w') left.dy=-6; if(e.key==='s') left.dy=6; if(e.key==='ArrowUp') right.dy=-6; if(e.key==='ArrowDown') right.dy=6; });
document.addEventListener('keyup',e=>{ if(['w','s'].includes(e.key)) left.dy=0; if(['ArrowUp','ArrowDown'].includes(e.key)) right.dy=0; });
draw();
</script>
</body>
</html>
